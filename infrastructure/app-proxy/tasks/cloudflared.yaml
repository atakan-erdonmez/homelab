- name: Ensure keyrings directory exists
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Download Cloudflare GPG key
  get_url:
    url: https://pkg.cloudflare.com/cloudflare-public-v2.gpg
    dest: /usr/share/keyrings/cloudflare-public-v2.gpg
    mode: '0644'

- name: Add Cloudflared repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main"
    filename: cloudflared

- name: Install cloudflared
  apt:
    name: cloudflared
    state: present
    update_cache: yes

- name: Ensure Cloudflared systemd override directory exists
  file:
    path: /etc/systemd/system/cloudflared.service.d
    state: directory

- name: Configure Cloudflared Auto-Restart Policy
  copy:
    dest: /etc/systemd/system/cloudflared.service.d/override.conf
    content: |
      [Service]
      Restart=always
      RestartSec=5s
      StartLimitIntervalSec=0
  notify: Reload systemd daemon

- name: Install cloudflared service
  command: "cloudflared service install {{ cloudflared_token }}"
  args:
    creates: /etc/systemd/system/cloudflared.service
  notify: Restart cloudflared

- name: Ensure Cloudflared is started and enabled
  service:
    name: cloudflared
    state: started
    enabled: yes