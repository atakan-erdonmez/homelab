- name: Sync Universal Nginx Templates
  template:
    src: templates/proxy.conf.j2
    dest: "/etc/nginx/conf.d/{{ item.name }}.conf"
  loop: "{{ services }}"
  notify: Reload nginx
  register: nginx_config_sync

- name: Validate Nginx Configuration
  command: nginx -t
  when: nginx_config_sync.changed
  changed_when: false

- name: Ensure Nginx are started
  service:
    name: nginx
    state: started
    enabled: yes