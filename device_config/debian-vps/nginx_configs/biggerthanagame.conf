# /etc/nginx/conf.d/
server {
    server_name biggerthanagame.net www.biggerthanagame.net;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot (removed ipv6only=on for consistency)
    ssl_certificate /etc/letsencrypt/live/biggerthanagame.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/biggerthanagame.net/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    listen [::]:80;
    server_name biggerthanagame.net www.biggerthanagame.net;

    return 301 https://$host$request_uri;
}
