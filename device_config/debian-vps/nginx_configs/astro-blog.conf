# /etc/nginx/conf.d/
server {
    server_name atakan-erdonmez.com www.atakan-erdonmez.com;

    root /var/www/astro-blog;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/atakan-erdonmez.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/atakan-erdonmez.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    listen [::]:80;
    server_name atakan-erdonmez.com www.atakan-erdonmez.com;

    return 301 https://$host$request_uri;
}
