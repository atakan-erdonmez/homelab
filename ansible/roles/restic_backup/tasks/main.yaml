---
- name: Install NFS client dependencies
  apt:
    name:
      - nfs-common
      - rpcbind
    state: present
    update_cache: yes

- name: Configure NFS mount in fstab and mount it
  mount:
    path: "{{ mount_point }}"
    src: "{{ nfs_server }}:{{ nfs_path }}"
    fstype: nfs
    opts: "{{ backup_nfs_mount_opts }}"
    state: mounted

- name: Install Restic
  apt:
    name: restic
    state: present

- name: Ensure Restic repo directory exists on NAS
  file:
    path: "{{ restic_repo }}"
    state: directory

- name: Ensure Restic local cache directory exists
  file:
    path: "{{ restic_cache_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check if Restic repo is already initialized
  stat:
    path: "{{ restic_repo }}/config"
  register: restic_repo_check

- name: Initialize Restic repository if needed
  command: "restic -r {{ restic_repo }} init"
  environment:
    RESTIC_PASSWORD: "{{ restic_password }}"
  when: not restic_repo_check.stat.exists

- name: Deploy backup script from template
  template:
    src: backup.sh.j2
    dest: "{{ backup_script_path }}"
    owner: root
    group: root
    mode: "0700"
  no_log: true

- name: Deploy systemd backup service from template
  template:
    src: backup.service.j2
    dest: "/etc/systemd/system/{{ backup_service_name }}-backup.service"
    owner: root
    group: root
    mode: "0644"

- name: Deploy systemd backup timer from template
  template:
    src: backup.timer.j2
    dest: "/etc/systemd/system/{{ backup_service_name }}-backup.timer"
    owner: root
    group: root
    mode: "0644"

- name: Ensure backup timer is enabled and running
  systemd:
    name: "{{ backup_service_name }}-backup.timer"
    enabled: yes
    state: started
    daemon_reload: yes