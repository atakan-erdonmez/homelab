services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    container_name: n8n
    restart: unless-stopped

    env_file:
      - .env

    expose:
      - "5678"

    volumes:
      - n8n_data:/home/node/.n8n

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    tmpfs:
      - /tmp:size=256m,mode=1777

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - n8n_internal

volumes:
  n8n_data:

networks:
  n8n_internal:
    name: n8n_internal