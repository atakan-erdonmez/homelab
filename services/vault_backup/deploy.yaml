---
- name: Vault Backup
  hosts: vps
  become: yes

  vars:
    backup_user: atakan
    backup_user_home: "/home/atakan"

    backup_dir: "/var/backups/vault_backup"
    script_dir: "/opt/services/vault_backup"

    ssh_key_path: "/home/atakan/.ssh/github_vault_backup"
    repo_host_alias: "github-vault"

  tasks:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        owner: "{{ backup_user }}"
        group: "{{ backup_user }}"
        mode: '0755'

    - name: Ensure script directory exists
      ansible.builtin.file:
        path: "{{ script_dir }}"
        state: directory
        owner: "{{ backup_user }}"
        group: "{{ backup_user }}"
        mode: '0755'

    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "{{ backup_user_home }}/.ssh"
        state: directory
        owner: "{{ backup_user }}"
        group: "{{ backup_user }}"
        mode: '0700'

    - name: Generate SSH deploy key on VPS if missing
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f {{ ssh_key_path }} -N "" -C "vault-backup-key"
        creates: "{{ ssh_key_path }}"
      become_user: "{{ backup_user }}"
  ## You would to manually deploy keys to GitHub

    - name: Ensure github.com is in known_hosts
      ansible.builtin.known_hosts:
        path: "{{ backup_user_home }}/.ssh/known_hosts"
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan github.com 2>/dev/null') }}"
        state: present
      become_user: "{{ backup_user }}"

    - name: Ensure SSH config contains GitHub vault host block
      ansible.builtin.blockinfile:
        path: "{{ backup_user_home }}/.ssh/config"
        create: yes
        owner: "{{ backup_user }}"
        group: "{{ backup_user }}"
        mode: '0600'
        marker: "# {mark} ANSIBLE MANAGED BLOCK github-vault"
        block: |
          Host {{ repo_host_alias }}
              HostName github.com
              User git
              IdentityFile {{ ssh_key_path }}
              IdentitiesOnly yes

    - name: Push backup script to VPS
      ansible.builtin.copy:
        src: "./vault_backup.py"
        dest: "{{ script_dir }}/vault_backup.py"
        owner: "{{ backup_user }}"
        group: "{{ backup_user }}"
        mode: '0755'

    - name: Schedule cron job
      ansible.builtin.cron:
        name: "Daily vault Backup"
        minute: "0"
        hour: "3"
        user: "{{ backup_user }}"
        job: "/usr/bin/python3 {{ script_dir }}/vault_backup.py"