---
- name: Deploy Guacamole by Copying Local Configs
  hosts: rasp
  become: true
  vars:
    base_dir: "/opt/services/guac"

  tasks:
    - name: Ensure remote directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ base_dir }}"
        - "{{ base_dir }}/init"
        - "{{ base_dir }}/mysql_data"

    - name: Copy local .env file to the destination
      copy:
        src: "./.env"
        dest: "{{ base_dir }}/.env"
        mode: '0600' # Keeps the password file private

    - name: Copy local docker-compose.yaml to the Pi
      copy:
        src: "./docker-compose.yaml"
        dest: "{{ base_dir }}/docker-compose.yaml"
        mode: '0644'

    - name: Generate SQL init script (only if missing on Pi)
      shell: >
        docker run --rm --platform linux/arm64 guacamole/guacamole:1.6.0 
        /opt/guacamole/bin/initdb.sh --mysql > {{ base_dir }}/init/init.sql
      args:
        creates: "{{ base_dir }}/init/init.sql"

    - name: Ensure SQL permissions are appended to init script
      lineinfile:
        path: "{{ base_dir }}/init/init.sql"
        line: "{{ item }}"
        insertafter: EOF
      loop:
        - "GRANT ALL PRIVILEGES ON guacamole_db.* TO 'guacamole_user'@'%';"
        - "FLUSH PRIVILEGES;"

    - name: Pull and start the Docker containers
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}"
        state: present
