---
- name: Deploy Kavita for e-book server
  hosts: debiandocker
  become: true
  vars:
    - base_dir: /opt/services/kavita/

  tasks:
    - name: Check if directory exists
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: atakan
        group: atakan
      loop:
        - "{{ base_dir }}"
        - "{{ base_dir}}/config"
        - "{{ base_dir }}/data"

    - name: Copy Docker Compose
      copy:
        src: ./compose.yaml
        dest: "{{ base_dir }}/compose.yaml"
        mode: '0644'
        owner: atakan
        group: atakan

    - name: Pull and run containers
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}"
        state: present
        pull: always

