---
- name: Deploy Kavita for e-book server
  hosts: debiandocker
  become: true
  vars_files:
    - "group_vars/all/secrets.yaml"
  vars:
    base_dir: "/opt/services/kavita"
    nfs_server: "192.168.10.103"
    nfs_path: "/services/kavita"
    mount_point: "/mnt/services/kavita"

    restic_repo: "{{ mount_point }}/repo"
    backup_script_path: "/usr/local/bin/kavita-backup.sh"
    # have a place to store scripts
    restic_password: "{{ kavita_restic_backup_pw }}"



  tasks:
    - name: Install NFS client dependencies
      apt:
        name:
          - nfs-common
          - rpcbind
        state: present
        update_cache: yes

    - name: Ensure local service directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: atakan
        group: atakan
      loop:
        - "{{ base_dir }}"
        - "{{ base_dir }}/config"
        - "{{ base_dir }}/data"


    - name: Configure NFS mount in fstab and mount it
      mount:
        path: "{{ mount_point }}"
        src: "{{ nfs_server }}:{{ nfs_path }}"
        fstype: nfs
        opts: "nfsvers=4.0,defaults,_netdev,noatime,timeo=600,retrans=5,x-systemd.automount,x-systemd.idle-timeout=600"
        state: mounted

    - name: Copy Docker Compose
      copy:
        src: ./compose.yaml
        dest: "{{ base_dir }}/compose.yaml"
        mode: '0644'
        owner: atakan
        group: atakan

    - name: Pull and run containers
      community.docker.docker_compose_v2:
        project_src: "{{ base_dir }}"
        state: present
        pull: always

## Backup Part
    - name: Install Restic
      apt:
        name: restic
        state: present

    - name: Ensure Restic repo directory exists on NAS
      file:
        path: "{{ restic_repo }}"
        state: directory


    - name: Check if Restic repo is already initialized
      stat:
        path: "{{ restic_repo }}/config"
      register: restic_repo_check

    - name: Initialize Restic repository if needed
      command: "restic -r {{ restic_repo }} init"
      environment:
        RESTIC_PASSWORD: "{{ restic_password }}"
      when: not restic_repo_check.stat.exists

    - name: Deploy backup script from template
      template:
        src: templates/kavita-backup.sh.j2
        dest: "{{ backup_script_path }}"
        owner: root
        group: root
        mode: '0700'
      no_log: true

    - name: Deploy systemd backup service from template
      template:
        src: templates/kavita-backup.service.j2
        dest: /etc/systemd/system/kavita-backup.service

    - name: Deploy systemd backup timer from template
      template:
        src: templates/kavita-backup.timer.j2
        dest: /etc/systemd/system/kavita-backup.timer

    - name: Ensure backup timer is enabled and running
      systemd:
        name: kavita-backup.timer
        enabled: yes
        state: started
        daemon_reload: yes