services:
  freshrss:
    image: freshrss/freshrss:latest
    hostname: freshrss
    container_name: freshrss
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${FRESHRSS_PORT}:80"
    volumes:
      - ./data:/var/www/FreshRSS/data
      - ./extensions:/var/www/FreshRSS/extensions
    environment:
      - TZ=${TZ}
      - CRON_MIN=${CRON_MIN}
      - TRUSTED_PROXY=${TRUSTED_PROXY}
      # Automated setup strings (Used only on first boot)
      - FRESHRSS_INSTALL=--db-type sqlite --default-user ${ADMIN_USER} --db-user ${ADMIN_USER} --db-password ${ADMIN_PASS} --db-base freshrss --db-host localhost --api-enabled --base-url ${BASE_URL}
      - FRESHRSS_USER=--user ${ADMIN_USER} --password ${ADMIN_PASS} --email ${ADMIN_EMAIL} --api-password ${ADMIN_API_PASS}