# n8n Reverse Proxy Configuration
server {
    listen 8080;
    server_name n8n-lab.atakan-erdonmez.com;

    # Performance: Increase max upload size for large workflow imports/exports
    client_max_body_size 50M;

    # Security Headers (Well-Architected Best Practices)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;

    location / {
        # Proxy to your n8n VM (using the IP we secured earlier)
        proxy_pass http://192.168.20.55:5678;

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (CRITICAL for n8n)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running workflows
        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for real-time log streaming in n8n UI
        proxy_buffering off;
    }
}