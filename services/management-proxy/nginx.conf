events {}

http {
    # Proxmox 1
    server {
        listen 8080;
        server_name pve1.lab.nexonet.space;

        location / {
            proxy_pass https://192.168.10.101:8006;
            proxy_set_header Host $host;
            proxy_ssl_verify off; # Proxmox self-signed fix
            
            # WebSocket Support (Required for Proxmox Console)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Proxmox 2
    server {
        listen 8080;
        server_name pve2.lab.nexonet.space;

        location / {
            proxy_pass https://192.168.10.102:8006;
            proxy_set_header Host $host;
            proxy_ssl_verify off;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Router GUI
    server {
        listen 8080;
        server_name router.lab.nexonet.space;

        location / {
            proxy_pass http://192.168.10.1;
            proxy_set_header Host $host;
        }
    }
}