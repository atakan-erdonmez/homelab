    ### Service: OpenClaw
    ### Test, will remove from management-proxy and put in app-proxy
    server {
        listen 8080; # Or 8080 to match your internal pattern
        server_name agent.atakan-erdonmez.com; # Adjust to your preferred subdomain

        # Performance: Standardizing with your QTS buffer style
        proxy_buffers 4 256k;
        proxy_buffer_size 128k;

        location / {
            # Replace with your Debian VM's actual internal IP
            proxy_pass http://192.168.20.53:18789; 

            # Identity & Security Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Security-Policy "upgrade-insecure-requests";

            # Functionality: WebSocket Support (Essential for AI Streaming)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Agent-Specific: Prevent timeouts during long AI reasoning ("Thinking")
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 600s;

            # Optional: Fixes internal redirect loops if the agent tries to go to /login
            proxy_redirect off;
        }
    }
}