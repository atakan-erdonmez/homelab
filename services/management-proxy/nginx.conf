events {
    worker_connections 1024;
}

http {
    # 1. THE BLACKHOLE (First block = Default)
    server {
        listen 8080 default_server;
        server_name _;
        return 404;
    }

    # 2. Proxmox 1
    server {
        listen 8080;
        server_name pve01-lab.nexonet.space;

        location / {
            proxy_pass https://192.168.10.101:8006;
            proxy_set_header Host $host;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # 2. Proxmox 2
    server {
        listen 8080;
        server_name pve02-lab.nexonet.space;

        location / {
            proxy_pass https://192.168.10.102:8006;
            proxy_set_header Host $host;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # 3. MIKROTIK ROUTER
    server {
        listen 8080;
        server_name router-lab.nexonet.space;

        location / {
            proxy_pass http://192.168.10.1;
            proxy_set_header Host $host;
        }
    }

    # 4. QNAP NAS
    server {
        listen 8080;
        server_name nas-lab.nexonet.space;

        location / {
            proxy_pass http://192.168.10.103:8080;
            proxy_set_header Host $host;
        }
    }
}