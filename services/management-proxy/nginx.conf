pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # For file-type security
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Send logs to Docker's collector (stdout/stderr)
    access_log /dev/stdout;
    error_log /dev/stderr;
    
    # Show actual IP with cloudflare
    set_real_ip_from 127.0.0.1;
    real_ip_header CF-Connecting-IP;

    # Security features
    server_tokens off; # To not give version info in error pages
    add_header X-Frame-Options "SAMEORIGIN" always; # Prevent Clickjacking
    add_header X-Content-Type-Options "nosniff" always; # Prevent MIME-sniffing
    add_header Referrer-Policy "strict-origin-when-cross-origin" always; # Prevent private info leake

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always; # Enable HSTS
    
    


    # 1. THE BLACKHOLE (First block = Default)
    server {
        listen 8080 default_server;
        server_name _;
        return 444;
    }

    # 2. Proxmox 1
    server {
        listen 8080;
        server_name pve01-lab.atakan-erdonmez.com;

        location / {
            proxy_pass https://192.168.10.101:8006;
            proxy_set_header Host $host;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # 2. Proxmox 2
    server {
        listen 8080;
        server_name pve02-lab.atakan-erdonmez.com;

        location / {
            proxy_pass https://192.168.10.102:8006;
            proxy_set_header Host $host;
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # 3. MIKROTIK ROUTER

#    server {
#        listen 8080;
#       server_name router-lab.atakan-erdonmez.com;
#
#       location / {
#            proxy_pass http://192.168.10.1;
#            proxy_set_header Host $host;
#        }
#    }

    # 4. QNAP NAS
server {
    listen 8080;
    server_name nas-lab.atakan-erdonmez.com;

    # Performance: Large buffers are required for QTS's heavy JS bundles
    proxy_buffers 4 256k;
    proxy_buffer_size 128k;

    location / {
        proxy_pass http://192.168.10.103:8080;
        
        # Identity & Security Headers
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Security-Policy "upgrade-insecure-requests";
        
        # Functionality: Fixes QTS internal redirect loops and WebSockets
        proxy_redirect http://192.168.10.103:8080/ /;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

    ### SERVICES

    # Kavita
